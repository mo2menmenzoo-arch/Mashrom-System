<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Definition of rich gradients for premium look -->
  <defs>
    <!-- Mushroom Cap: rich natural brown gradient -->
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a67c52" />
      <stop offset="50%" stop-color="#8a5e38" />
      <stop offset="100%" stop-color="#593b21" />
    </linearGradient>
    
    <!-- Gills: soft warm textured cream -->
    <linearGradient id="gillsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eed8c5" />
      <stop offset="100%" stop-color="#cca88a" />
    </linearGradient>
    
    <!-- Stalk: organic vertical white/grey gradient -->
    <linearGradient id="stalkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e2dad3" />
      <stop offset="35%" stop-color="#f7f4f0" />
      <stop offset="65%" stop-color="#f7f4f0" />
      <stop offset="100%" stop-color="#dad0c7" />
    </linearGradient>
    
    <!-- Sprout Leaves Gradient -->
    <linearGradient id="sproutGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d7e5a" />
      <stop offset="100%" stop-color="#76c893" />
    </linearGradient>
    <linearGradient id="sproutGradLight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#52b788" />
      <stop offset="100%" stop-color="#99e2b4" />
    </linearGradient>
    
    <!-- Soil Gradient -->
    <radialGradient id="soilGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#462d1a" />
      <stop offset="80%" stop-color="#2a1a0f" />
      <stop offset="100%" stop-color="#140b06" />
    </radialGradient>

    <!-- Outer frame sweeping leaf gradient -->
    <linearGradient id="sweepLeafGrad" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#143622" />
      <stop offset="50%" stop-color="#1e4e31" />
      <stop offset="100%" stop-color="#2d6a4f" />
    </linearGradient>
  </defs>

  <!-- 1. Outer Dark-Green Circular Outline with bottom-right leaf sweep -->
  <!-- Outline starting from top-left, going around, ending where the leaf curves -->
  <path d="M 120,380 A 190,190 0 1,1 405,290" fill="none" stroke="#1d3f28" stroke-width="11" stroke-linecap="round" />
  
  <!-- Sweeping connection completing the circular loop at the bottom left -->
  <path d="M 120,380 C 145,410 195,435 250,435 C 290,435 325,425 350,410" fill="none" stroke="#1d3f28" stroke-width="11" stroke-linecap="round" />

  <!-- 2. Dark Green Sweeping Leaf on the Bottom Right -->
  <!-- This leaf curves upwards and represents the brand's organic leaf graphic -->
  <path d="M 405,290 C 430,245 425,185 365,225 C 325,250 305,305 270,360 C 295,385 340,385 375,355 C 395,335 400,310 405,290 Z" fill="url(#sweepLeafGrad)" />
  <!-- Center vein of the sweeping leaf -->
  <path d="M 270,360 Q 330,320 365,225" fill="none" stroke="#52b788" stroke-width="4.5" stroke-linecap="round" />

  <!-- 3. Soil Mound at the Base of the Mushroom -->
  <path d="M 160,375 Q 250,335 340,375 C 330,425 285,435 250,435 C 215,435 170,425 160,375 Z" fill="url(#soilGrad)" />
  
  <!-- Soil surface details (grains/shadows) -->
  <ellipse cx="210" cy="405" rx="12" ry="6" fill="#140b06" opacity="0.9" />
  <ellipse cx="280" cy="395" rx="15" ry="7" fill="#140b06" opacity="0.9" />
  <circle cx="230" cy="415" r="5" fill="#1e1008" />
  <circle cx="265" cy="410" r="4" fill="#1e1008" />

  <!-- 4. Mushroom Stalk -->
  <!-- Beautiful organic vertical column -->
  <path d="M 215,370 C 210,270 215,215 220,195 L 280,195 C 285,215 290,270 285,370 C 285,385 275,395 250,395 C 225,395 215,385 215,370 Z" fill="url(#stalkGrad)" />
  
  <!-- 5. Mushroom Gills (Underside cap) -->
  <!-- Elliptical shape at the transition between stalk and cap -->
  <path d="M 142,210 C 142,175 358,175 358,210 C 358,245 142,245 142,210 Z" fill="url(#gillsGrad)" />
  
  <!-- Radiating Gill lines -->
  <g stroke="#91735a" stroke-width="2.5" opacity="0.6">
    <line x1="250" y1="210" x2="152" y2="210" />
    <line x1="250" y1="210" x2="348" y2="210" />
    <line x1="250" y1="210" x2="162" y2="195" />
    <line x1="250" y1="210" x2="338" y2="195" />
    <line x1="250" y1="210" x2="182" y2="185" />
    <line x1="250" y1="210" x2="318" y2="185" />
    <line x1="250" y1="210" x2="212" y2="180" />
    <line x1="250" y1="210" x2="288" y2="180" />
    <line x1="250" y1="210" x2="162" y2="225" />
    <line x1="250" y1="210" x2="338" y2="225" />
    <line x1="250" y1="210" x2="182" y2="235" />
    <line x1="250" y1="210" x2="318" y2="235" />
    <line x1="250" y1="210" x2="212" y2="240" />
    <line x1="250" y1="210" x2="288" y2="240" />
  </g>

  <!-- 6. Mushroom Cap -->
  <!-- Large dome cap overlapping the gills -->
  <path d="M 134,210 C 132,192 140,165 175,135 C 212,102 288,102 325,135 C 360,165 368,192 366,210 C 368,222 358,226 346,224 C 296,212 204,212 154,224 C 142,226 132,222 134,210 Z" fill="url(#capGrad)" />
  <!-- Realistic volume-enhancing highlights and shadows -->
  <path d="M 175,135 C 212,112 288,112 325,135 C 295,122 205,122 175,135 Z" fill="#ffffff" opacity="0.18" />

  <!-- 7. Small Sprout with Two Green Leaves on the Bottom-Left -->
  <!-- Stem -->
  <path d="M 195,385 Q 188,355 175,335" fill="none" stroke="#255a3c" stroke-width="5" stroke-linecap="round" />
  <!-- Main Sprout Leaf (pointing left-up) -->
  <path d="M 175,335 C 148,332 120,305 115,275 C 140,282 162,310 175,335 Z" fill="url(#sproutGrad)" />
  <path d="M 175,335 Q 146,306 115,275" fill="none" stroke="#163a25" stroke-width="2" />
  
  <!-- Secondary Sprout Leaf (pointing right-up) -->
  <path d="M 183,360 C 196,355 218,342 222,330 C 212,336 195,348 183,360 Z" fill="url(#sproutGradLight)" />
  <path d="M 183,360 Q 204,345 222,330" fill="none" stroke="#255a3c" stroke-width="1.5" />
</svg>
