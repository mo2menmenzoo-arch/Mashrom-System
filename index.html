    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(val) { originalFetch = val; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Unable to patch window.fetch:", e);
        }
      })();
    </script>
